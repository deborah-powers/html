<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<title>éditer mes photos</title>
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<meta charset="utf-8">
	<!-- base href="" -->
	<link rel="manifest" href="manifest.webmanifest">
	<link rel="icon" type="image/png" href="nounours.svg">
	<link rel="stylesheet" type="text/css" href="phed-common.css">
	<link rel="stylesheet" type="text/css" href="phed-crop.css">
	<link rel="stylesheet" type="text/css" href="phed-rotate.css">
	<meta name="msapplication-TileImage" content="nounours.svg">
	<meta name="msapplication-TileColor" content="#C29FC2">
	<meta name="theme-color" content="#C29FC2">
	<link rel="apple-touch-icon" type="image/png" href="nounours.svg">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="#C29FC2">
	<meta name="apple-mobile-web-app-title" content="éditer mes photos">
<style type="text/css">
</style><script src="prompt.js"></script></head><body>
	<article id="main-screen" class="current">
		<h1>éditeur d'image basique utilisable sur le smarphone</h1>
		<ul>
			<li><label class="button" for="televersement">téléversez</label><input type="file" id="televersement" style="display:none" accept="image/png, image/jpg, image/bmp"></li>
			<li><button onclick="goCrop()">recadrer</button></li>
			<li><button onclick="goRotate()">redresser</button></li>
			<li><button onclick="tumble90degree()">basculer</button></li>
			<li><button onclick="downloadImage()">télécharger</button><a href="" download="" style="display:none">télécharger</a></li>
		</ul>
		<img src="" alt="l'image s'afichera ici">
	</article>
	<article id="crop-screen">
		<h2>recadrer l'image</h2>
		<ul>
			<li><button onclick="resetHard()">restaurer</button></li>
			<li><button onclick="resetCrop()">annuler</button></li>
			<li><button onclick="validateCrop()">valider</button></li>
		</ul>
		<div id="slider-frame">
			<p></p>
			<div class="slider"><input type="range" min="0" max="100" value="0"><input type="range" min="0" max="100" value="100"></div>
			<div class="slider vertical">
				<input type="range" min="0" max="100" value="0"><input type="range" min="0" max="100" value="100">
			</div>
			<svg version="1.1" width="300" height="300" xmlns="http://www.w3.org/2000/svg">
				<line x1="0" x2="0" y1="0" y2="100%"></line>
				<line x1="0" x2="0" y1="0" y2="100%"></line>
				<line x1="0" x2="100%" y1="0" y2="0"></line>
				<line x1="0" x2="100%" y1="0" y2="0"></line>
			</svg>
		</div>
	</article>
	<article id="rotate-screen">
		<h2>redresser l'image</h2>
		<ul>
			<li><button onclick="resetHard()">restaurer</button></li>
			<li><button onclick="resetRotate()">annuler</button></li>
			<li><button onclick="rotateLeft()">pivoter à gauche</button></li>
			<li><button onclick="rotateRight()">pivoter à droite</button></li>
			<li><button onclick="validateRotate()">valider</button></li>
		</ul>
		<div><img src="" alt="image à redresser"></div>
	</article>
	<script type="text/javascript" src="phed-common.js"></script>
	<script type="text/javascript" src="phed-init.js"></script>
	<script type="text/javascript" src="phed-crop.js"></script>
	<script type="text/javascript" src="phed-rotate.js"></script>

</body></html>
