<!DOCTYPE html><html><head>
	<title>éditer des images</title>
	<meta name='viewport' content='width=device-width,initial-scale=1'/>
	<meta charset='utf-8'/>
	<base target='_blank'>
	<link rel='icon' type='image/svg+xml' href='file:///C:/wamp64/www/site-dp/data/nounours-perso.svg'/>
	<link rel='stylesheet' type='text/css' href='https://deborah-powers.fr/library-css/structure.css'/>
	<link rel='stylesheet' type='text/css' href='https://deborah-powers.fr/library-css/perso.css' media='screen'/>
	<link rel='stylesheet' type='text/css' href='phed-crop.css'/>
	<link rel='stylesheet' type='text/css' href='phed-straight.css'/>
<style type='text/css'>
	label {
		padding: 0.4em;
		text-align: center;
		display: inline-block;
		color: var(--button-color, black);
		background-color: var(--button-bg, #969696);
		border-style: var(--button-border, none);
	}
	img {
		display: block;
	/*	width: 100%; */
		background-color: var(--fond-color);
		min-height: 2em;
		mix-blend-mode: normal;
	}
	article { display: none; }
	article.current { display: block; }
	ul {
		list-style-type: none;
		display: flex;
		justify-content: space-between;
		margin-left: 0;
	}
</style></head><body>
	<article id='main-screen' class='current'>
		<h1>éditeur d'image basique utilisable sur le smarphone</h1>
		<ul>
			<li><label class='button' for='televersement'>téléversez</label><input type='file' id='televersement' style='display:none' accept='image/png, image/jpg, image/bmp' /></li>
			<li><button onclick='goCrop()'>recadrer</button></li>
			<li><button onclick='goStraight()'>redresser</button></li>
			<li><button onclick='tumble90degree()'>basculer</button></li>
			<li><button onclick='downloadImage()'>télécharger</button><a href='' download='' class='button' style='display:none'>télécharger</a></li>
		</ul>
		<img src='' alt="l'image s'afichera ici" />
	</article>
	<article id='crop-screen'>
		<h2>recadrer l'image</h2>
		<ul>
			<li><button onclick='resetHard()'>restaurer</button></li>
			<li><button onclick='resetSoft()'>annuler</button></li>
			<li><button onclick='validateCrop()'>valider</button></li>
		</ul>
		<div id='slider-frame'>
			<p></p>
			<div class='slider'><input type='range' min='0' max='100' value='0' /><input type='range' min='0' max='100' value='100' /></div>
			<div class='slider vertical'>
				<input type='range' min='0' max='100' value='0' /><input type='range' min='0' max='100' value='100' />
			</div>
			<svg version='1.1' width='300' height='300' xmlns='http://www.w3.org/2000/svg'>
				<line x1='0' x2='0' y1='0' y2='100%' />
				<line x1='0' x2='0' y1='0' y2='100%' />
				<line x1='0' x2='100%' y1='0' y2='0' />
				<line x1='0' x2='100%' y1='0' y2='0' />
			</svg>
		</div>
	</article>
	<article id='straight-screen'>
		<h2>redresser l'image</h2>
		<ul>
			<li><button onclick='resetHard()'>restaurer</button></li>
			<li><button onclick='resetSoft()'>annuler</button></li>
			<li><button onclick='rotateLeft()'>pivoter à gauche</button></li>
			<li><button onclick='rotateRight()'>pivoter à droite</button></li>
			<li><button onclick='validateStraight()'>valider</button></li>
		</ul>
		<div>
			<img src='' alt='image à redresser' />
		</div>
	</article>
</body><script type='text/javascript'>
	// script de l'écran principal
	const uploader = document.getElementsByTagName ('input')[0];
	const imageRef = { src: "", dst: "", xo: 0, yo: 0, xu: 100, yu: 100, scale: 1, rotation: 0 };
	const imageModif = document.getElementsByTagName ('img')[0];
	const linkDownload = document.getElementsByTagName ('a')[0];

	uploader.addEventListener ('change', function (event){
		imageRef.src = URL.createObjectURL (event.target.files[0]);
		imageModif.src = imageRef.src;
		imageRef.dst = imageRef.src;
		const p= event.target.files[0].name.lastIndexOf ('.');
		linkDownload.download = event.target.files[0].name.substring (0,p) +' bis' + event.target.files[0].name.substring (p);
		imageModif.alt = event.target.files[0].name.substring (0,p);
	});
	imageModif.onload = function(){ if ('blob:' === imageRef.dst.substring (0,5)) this.resizeWindow(); }
	// script commun aux écrans de modification
	const screens = document.getElementsByTagName ('article');
	function resetSoft(){
		imageModif.src = imageRef.dst;
		for (var screen of screens){
			if (screen.id === 'main-screen') screen.className = 'current';
			else screen.className ="";
	}}
	function resetHard(){
		imageRef.xo =0;
		imageRef.xu =100;
		imageRef.yo =0;
		imageRef.yu =100;
		imageRef.rotation =0;
		imageRef.dst = imageRef.dst;
		imageModif.src = imageRef.src;
		for (var screen of screens){
			if (screen.id === 'main-screen') screen.className = 'current';
			else screen.className ="";
	}}
	HTMLElement.prototype.getInputsByType = function (typeName){
		const inputs = this.getElementsByTagName ('input');
		var inputsFin =[];
		for (var inp of inputs){
			if (typeName === inp.type) inputsFin.push (inp);
		}
		return inputsFin;
	}
	function downloadImage(){
		// retrouver les dimensions d'origine
		imageModif.width *= imageRef.scale;
		imageModif.height *= imageRef.scale;
		// hauteur maximale des images
		if (imageModif.height >800){
			imageRef.scale = imageModif.height / 800;
			imageModif.width /= imageRef.scale;
			imageModif.height = 800;
		}
		imageRef.scale =1;
		// dessiner l'image
		const canvas = document.createElement ('canvas');
		const context = canvas.getContext ('2d');
		canvas.width = imageModif.width;
		canvas.height = imageModif.height;
		context.drawImage (imageModif, 0,0);
		// activer le lien
		linkDownload.href = canvas.toDataURL();
		linkDownload.click();
	}
	function dimensionToNb (dimension){
		// dimension = "20px"
		dimension = dimension.substring (0, dimension.length -2);
		dimensionNb = parseInt (dimension);
		return dimensionNb;
	}
	HTMLImageElement.prototype.resizeWindow = function(){
		const bodyStyle = window.getComputedStyle (document.body);
		var widthMax = document.body.clientWidth;
		const padding = 2* dimensionToNb (bodyStyle.padding);
		widthMax -= padding;
		if (this.width <= widthMax) return;
		imageRef.scale = this.width / widthMax;
		const scaleHeight = parseInt (this.height / imageRef.scale);
		this.width = widthMax;
		this.height = scaleHeight;
		const canvas = document.createElement ('canvas');
		const context = canvas.getContext ('2d');
		canvas.width = widthMax;
		canvas.height = scaleHeight;
		context.drawImage (this, 0,0, widthMax, scaleHeight);
		this.src = canvas.toDataURL();
	}
	function tumble90degree(){
		const canvas = document.createElement ('canvas');
		const context = canvas.getContext ('2d');
		canvas.width = imageModif.height;
		canvas.height = imageModif.width;
		context.rotate (Math.PI /2);
		context.drawImage (imageModif, 0, - imageModif.height, canvas.height, canvas.width);
		imageModif.width = canvas.width;
		imageModif.height = canvas.height;
		imageModif.src = canvas.toDataURL();
		imageRef.dst = imageModif.src;
		linkDownload.href = imageModif.src;
	}
</script>
	<script type='text/javascript' src='phed-crop.js'></script>
	<script type='text/javascript' src='phed-straight.js'></script>
</html>
