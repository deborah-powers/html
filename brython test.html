	<script type='text/python' defer>
from browser import document, html
print ('exemple')
document <= 'Bonjour !'	# document reçoit le texte bonjour et doit l'afficher dans le body
document <= html.P ('Bonjour !')	# document reçoit le texte bonjour et doit l'afficher dans dans un paragraphe
document <= html.P ('je suis votre '+ html.I ('amie'))
document <= html.OL (html.LI(i) for i in range(5))
document <= html.A ('tester un lien', href='https://brython.info/')
# image d'une calculatrice
calc = html.TABLE()
calc <= html.TR (html.TH (html.DIV ('0', id='result'), colspan=3) + html.TD ('C', id='clear'))
lines = [ '789/', '456*', '123-', '0.=+' ]
calc <= (html.TR(html.TD(x) for x in line) for line in lines)
document <= calc
# faire marcher la calculatrice
result = document['result']	# récupérer un élément par son id
def pressTouch (event):
	# Gère l'événement 'click' sur un bouton de la calculatrice
	# L'élément sur lequel l'utilisateur a cliqué est l'attribut 'target' de
	# l'objet event
	element = event.target
	# Le texte affiché sur le bouton est l'attribut 'text' de l'élément
	value = element.text
	if value not in '=C':
		# mise à jour du contenu de la zone 'result'
		if result.text in ['0', 'erreur']: result.text = value
		else: result.text = result.text + value
	elif value == 'C': result.text = '0'
	elif value == '=':
		# exécution de la formule saisie
		try:
			x = eval(result.text)
			result.text = x
		except: result.text = 'erreur'

touchList = document.select ('td')	# sélecteur css qui récupère les td, comme getElementsByTagName
for touch in touchList: touch.bind ('click', pressTouch)	# comme addEventListener
	</script>
