</body><script type='text/javascript'>
	const showFname = document.getElementById ('showFname');
	const dateFrame = document.getElementsByTagName ('section')[0];
	const dateRef = new Date ('2026-03-02T10:00:00Z');
	const monthNames =[ 'janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre' ];

	Date.prototype.toMessage = function(){
		var dateMsg ="";
		var dateNb = this.getDate();
		if (dateNb <10) dateMsg = '0'+ dateNb.toString() +" ";
		else dateMsg = dateNb.toString() +" ";
		dateNb = this.getMonth();
		dateMsg = dateMsg + monthNames [dateNb] +" "+ this.getFullYear();
		dateFrame.innerHTML = dateFrame.innerHTML +'<p>'+ dateMsg +'</p>';	// affichage sur la page
		this.setDate (this.getDate() +14);	// incrémenter la date de 2 semaines
	}
	var title = document.getElementsByTagName ('h1')[0];
	title.innerHTML = title.innerHTML.replace ('$year', dateRef.getFullYear());
	dateRef.toMessage();
